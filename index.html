<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="The Masterbook — Film production purchase tracking" />
  <title>The Masterbook</title>

  <link rel="stylesheet" href="src/styles.css?v=121" />

  <!--
    PDF.js v3.11.174 — used for client-side text extraction from PDF receipts.
    The worker script is set in submissionForm.js via pdfjsLib.GlobalWorkerOptions.workerSrc.
  -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"
          crossorigin="anonymous"
          referrerpolicy="no-referrer"></script>

  <!-- pdf-lib — used for filling PDF form fields (Insurance COI Generator) -->
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"
          crossorigin="anonymous"
          referrerpolicy="no-referrer"></script>
</head>
<body>

<aside id="macro-sidebar" class="macro-sidebar">
  <div class="macro-sidebar-top">
    <button class="macro-btn" id="macro-home" data-route-target="home" title="Project Menu">
      <img id="sidebar-logo" class="sidebar-logo" src="assets/logo-night.png" alt="The Masterbook" />
    </button>
  </div>
  <div class="macro-sidebar-items">
    <button class="macro-btn" data-route-target="budget" title="Production Budget">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
        <rect x="4" y="2" width="16" height="20" rx="2"/>
        <line x1="4" y1="8" x2="20" y2="8"/>
        <line x1="9" y1="13" x2="16" y2="13"/>
        <line x1="9" y1="17" x2="14" y2="17"/>
        <line x1="9" y1="8" x2="9" y2="22"/>
      </svg>
      <span class="macro-label">Budget</span>
    </button>
    <button class="macro-btn" data-route-target="schedules" title="Schedules">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
        <rect x="7" y="14" width="3" height="3" rx="0.5"/>
      </svg>
      <span class="macro-label">Schedules</span>
    </button>
    <button class="macro-btn" data-route-target="call-sheet" title="Call Sheet">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
        <rect x="5" y="2" width="14" height="20" rx="2"/>
        <line x1="9" y1="6" x2="15" y2="6"/>
        <line x1="9" y1="10" x2="15" y2="10"/>
        <line x1="9" y1="14" x2="13" y2="14"/>
        <line x1="9" y1="18" x2="12" y2="18"/>
      </svg>
      <span class="macro-label">Call Sheet</span>
    </button>
    <button class="macro-btn" data-route-target="insurance" title="Insurance">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
        <path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z"/>
        <polyline points="9 12 11 14 15 10"/>
      </svg>
      <span class="macro-label">Insurance</span>
    </button>
    <button class="macro-btn" data-route-target="files" title="Files">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
        <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
      </svg>
      <span class="macro-label">Files</span>
    </button>
  </div>
</aside>

  <div id="app">
    <!-- Shell, nav, and page content are rendered by app.js -->
  </div>

  <!--
    Modules loaded in dependency order.
    app.js is the entry point; it imports from data.js, purchaseLog.js, submissionForm.js.
  -->
  <script type="module" src="src/app.js?v=169"></script>

</body>
</html>
